services:
  cluster-master:
    image: firasj/spark-docker-cluster
    platform: linux/amd64
    container_name: cluster-master
    ports:
      - "8088:8088"
      - "4040:4040"
      - "19888:19888"
      - "9000:9000"
      - "9870:9870"
    volumes:
      - "./app:/app"
      - "./hadoop/workers:/usr/local/hadoop/etc/hadoop/workers:ro"
      - "./hadoop/yarn-site.xml:/usr/local/hadoop/etc/hadoop/yarn-site.xml:ro"
    networks:
      - spark-cluster
    depends_on:
      cluster-slave-1:
        condition: service_healthy
      cluster-slave-2:
        condition: service_healthy
      cassandra-server:
        condition: service_healthy
    hostname: cluster-master
    tty: true
    working_dir: /app
    entrypoint:
      - bash
      - /app/app.sh

  cluster-slave-1:
    image: firasj/spark-docker-cluster
    platform: linux/amd64
    container_name: cluster-slave-1
    networks:
      - spark-cluster
    hostname: cluster-slave-1
    tty: true
    volumes:
      - "./hadoop/workers:/usr/local/hadoop/etc/hadoop/workers:ro"
      - "./hadoop/yarn-site.xml:/usr/local/hadoop/etc/hadoop/yarn-site.xml:ro"
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln 2>/dev/null | grep -q ':22 '"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  cluster-slave-2:
    image: firasj/spark-docker-cluster
    platform: linux/amd64
    container_name: cluster-slave-2
    networks:
      - spark-cluster
    hostname: cluster-slave-2
    tty: true
    volumes:
      - "./hadoop/workers:/usr/local/hadoop/etc/hadoop/workers:ro"
      - "./hadoop/yarn-site.xml:/usr/local/hadoop/etc/hadoop/yarn-site.xml:ro"
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln 2>/dev/null | grep -q ':22 '"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  cassandra-server:
    image: cassandra:4.1
    container_name: cassandra-server
    ports:
      - "9042:9042"
    networks:
      - spark-cluster
    volumes:
      - ./data/cassandra:/var/lib/cassandra
    environment:
      - CASSANDRA_MAX_HEAP_SIZE=256M
      - CASSANDRA_HEAP_NEWSIZE=128M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESC KEYSPACES' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s

networks:
  spark-cluster:
    driver: bridge
